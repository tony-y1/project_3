<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Write Down Your Day</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Petit+Formal+Script&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        #us-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        /* 워터마크 강제 숨김 */
        a[href*="unicorn.studio"],
        a[href*="hiunicornstudio"],
        .unicorn-studio-watermark,
        [class*="unicorn-studio"],
        [id*="unicorn-studio"] {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }

        .login-above-bg {
            position: relative;
            z-index: 10;
        }

        /* 글라스모피즘 카드 */
        .login-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            box-shadow:
                0 8px 32px rgba(0, 0, 0, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }

        /* 구분선 */
        .login-divider {
            background-color: rgba(255, 255, 255, 0.3);
        }

        /* 헤딩 */
        .login-heading {
            color: #ffffff;
        }

        /* 라벨 */
        .login-label {
            color: rgba(255, 255, 255, 0.55);
        }

        /* 인풋 */
        .login-input {
            background-color: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.25);
            color: #ffffff;
            transition: border-color 0.25s ease;
            box-shadow: none;
        }

        .login-input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .login-input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.7);
            box-shadow: none;
            background-color: transparent;
        }

        /* autofill */
        .login-input:-webkit-autofill,
        .login-input:-webkit-autofill:hover,
        .login-input:-webkit-autofill:focus,
        .login-input:-webkit-autofill:active {
            -webkit-text-fill-color: #ffffff;
            -webkit-box-shadow: 0 0 0 1000px transparent inset;
            box-shadow: 0 0 0 1000px transparent inset;
            transition: background-color 9999s ease-out 0s;
            caret-color: #ffffff;
        }

        /* 제출 버튼 */
        .login-submit-btn {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.28);
            backdrop-filter: blur(8px);
            transition: all 0.25s ease;
        }

        .login-submit-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
        }

        /* 하단 안내 텍스트 */
        .login-small-text {
            color: rgba(255, 255, 255, 0.45);
        }

        .login-toggle-btn {
            color: rgba(255, 255, 255, 0.85);
        }

        /* 메시지 */
        #login-message,
        #signup-message {
            color: rgba(255, 255, 255, 0.8);
        }

        #password-match-msg {
            color: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body class="page-login min-h-screen flex items-center justify-center relative font-kr">

    <div id="us-background" data-us-project="ZnNikMOUWaAR1UzFsvqp"></div>

    <a href="index.html" class="login-above-bg absolute top-8 left-8 text-white/70 flex items-center gap-2 hover:text-white transition-colors z-50">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        <span class="tracking-widest text-sm uppercase">Back to Home</span>
    </a>

    <div class="login-above-bg login-card w-[90vw] max-w-md p-10 sm:p-12 rounded-sm animate-fade">
        <div class="text-center mb-10">
            <h2 class="login-heading font-script text-4xl mb-2">Welcome</h2>
            <div class="login-divider w-12 h-[1px] mx-auto opacity-50"></div>
        </div>

        <div id="login-form">
            <h3 class="login-heading text-xl font-medium mb-8 text-center tracking-tight">로그인</h3>
            <form id="login-form-element" class="space-y-6">
                <div>
                    <label for="login-username" class="login-label block text-xs uppercase tracking-widest mb-2">ID</label>
                    <input
                        id="login-username"
                        name="username"
                        type="text"
                        inputmode="text"
                        autocapitalize="none"
                        autocomplete="username"
                        required
                        class="login-input w-full py-2 px-1 text-sm"
                        placeholder="아이디를 입력하세요"
                    >
                </div>
                <div>
                    <label for="login-password" class="login-label block text-xs uppercase tracking-widest mb-2">Password</label>
                    <input
                        id="login-password"
                        name="password"
                        type="password"
                        required
                        class="login-input w-full py-2 px-1 text-sm"
                        placeholder="비밀번호를 입력하세요"
                    >
                </div>
                <button id="login-submit" type="submit" class="login-submit-btn w-full py-4 mt-4 text-sm tracking-[0.2em] uppercase font-medium rounded-sm">
                    Sign In
                </button>
                <p id="login-message" class="hidden text-sm text-center mt-4"></p>
            </form>
            <p class="login-small-text text-center mt-8 text-xs">
                계정이 없으신가요?
                <button type="button" onclick="toggleForm('signup')" class="login-toggle-btn underline hover:opacity-100 font-bold ml-1">회원가입</button>
            </p>
        </div>

        <div id="signup-form" class="hidden-form">
            <h3 class="login-heading text-xl font-medium mb-8 text-center tracking-tight">회원가입</h3>
            <form id="signup-form-element" class="space-y-6">
                <div>
                    <label for="signup-nickname" class="login-label block text-xs uppercase tracking-widest mb-2">Name</label>
                    <input
                        id="signup-nickname"
                        name="nickname"
                        type="text"
                        required
                        class="login-input w-full py-2 px-1 text-sm"
                        placeholder="닉네임을 입력하세요"
                    >
                </div>
                <div>
                    <label for="signup-username" class="login-label block text-xs uppercase tracking-widest mb-2">ID</label>
                    <input
                        id="signup-username"
                        name="username"
                        type="text"
                        inputmode="text"
                        autocapitalize="none"
                        autocomplete="username"
                        required
                        class="login-input w-full py-2 px-1 text-sm"
                        placeholder="아이디를 입력하세요"
                    >
                </div>
                <div>
                    <label for="signup-password" class="login-label block text-xs uppercase tracking-widest mb-2">Password</label>
                    <input
                        id="signup-password"
                        name="password"
                        type="password"
                        required
                        minlength="8"
                        class="login-input w-full py-2 px-1 text-sm"
                        placeholder="비밀번호를 입력하세요"
                    >
                </div>
                <div>
                    <label for="signup-password-confirm" class="login-label block text-xs uppercase tracking-widest mb-2">Confirm Password</label>
                    <input
                        id="signup-password-confirm"
                        name="passwordConfirm"
                        type="password"
                        required
                        minlength="8"
                        class="login-input w-full py-2 px-1 text-sm"
                        placeholder="비밀번호를 다시 입력하세요"
                    >
                    <p id="password-match-msg" class="mt-2 text-xs hidden"></p>
                </div>
                <p id="signup-message" class="hidden text-xs"></p>
                <button id="signup-submit" type="submit" class="login-submit-btn w-full py-4 mt-4 text-sm tracking-[0.2em] uppercase font-medium rounded-sm">
                    Join Us
                </button>
            </form>
            <p class="login-small-text text-center mt-8 text-xs">
                이미 계정이 있으신가요?
                <button type="button" onclick="toggleForm('login')" class="login-toggle-btn underline hover:opacity-100 font-bold ml-1">로그인</button>
            </p>
        </div>
    </div>

    <script src="js/frontend.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
