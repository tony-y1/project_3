<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일기 보기 - "하루" commit()</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Petit+Formal+Script&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body class="page-diary-detail min-h-screen relative font-kr">

    <a href="my-diary.html" class="absolute top-8 left-8 text-[#E8D8C4] flex items-center gap-2 hover:opacity-70 transition-opacity z-50">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        <span class="tracking-widest text-sm uppercase">Back to Diary</span>
    </a>

    <main class="min-h-screen px-6 py-24 md:px-10 lg:px-16">
        <div class="diary-detail-shell">
            <div class="text-center mb-12">
                <p class="font-script text-2xl md:text-3xl text-[#E8D8C4]/85 mb-3">Read your day</p>
                <h1 class="text-3xl md:text-5xl tracking-tight text-[#E8D8C4] font-semibold mb-4">
                    저장된 일기 보기
                </h1>
                <div class="w-24 h-[1px] mx-auto bg-[#C7B7A3]/70 mb-5"></div>
                <p class="text-[#E8D8C4] text-sm md:text-base max-w-2xl mx-auto leading-relaxed">
                    내가 저장한 일기 내용과 AI 리뷰를 한 화면에서 확인할 수 있어요.
                </p>
            </div>

            <div class="diary-detail-grid">
                <section class="diary-detail-panel">
                    <div class="flex items-center justify-between gap-4 mb-8">
                        <div>
                            <p class="font-script text-xl text-[#561C24]/80 mb-1">Diary record</p>
                            <h2 class="text-2xl md:text-3xl font-semibold text-[#561C24]">나의 하루 기록</h2>
                        </div>
                    </div>

                    <div class="space-y-6">
                        <div class="diary-meta-grid">
                            <div>
                                <label class="diary-detail-label">날짜</label>
                                <input id="diary-read-date" type="date" class="diary-detail-input" readonly>
                            </div>

                            <div>
                                <label class="diary-detail-label">오늘의 감정</label>
                                <input id="diary-read-emotion" type="text" class="diary-detail-input" readonly>
                            </div>

                            <div>
                                <label class="diary-detail-label">날씨</label>
                                <input id="diary-read-weather" type="text" class="diary-detail-input" readonly>
                            </div>
                        </div>

                        <div>
                            <label class="diary-detail-label">제목</label>
                            <input id="diary-read-title" type="text" class="diary-detail-input" readonly>
                        </div>

                        <div>
                            <label class="diary-detail-label">일기 내용</label>
                            <textarea id="diary-read-content" class="diary-detail-textarea" readonly></textarea>
                        </div>

                        <div class="flex flex-col sm:flex-row gap-3 pt-2">
                            <a href="my-diary.html" class="cancel-btn inline-flex items-center justify-center">목록으로</a>
                            <button id="diary-edit-button" type="button" class="save-btn">수정하기</button>
                            <button id="diary-delete-button" type="button" class="delete-btn">삭제하기</button>
                        </div>
                    </div>
                </section>

                <aside class="diary-detail-side">
                    <div class="mb-8">
                        <p class="font-script text-xl text-[#E8D8C4] mb-1">AI review</p>
                        <h2 class="text-2xl md:text-3xl font-semibold text-[#E8D8C4]">AI 리뷰</h2>
                        <p class="text-[#E8D8C4] text-sm mt-3 leading-relaxed">
                            저장한 일기에 대한 AI 요약과 한마디를 보는 영역이에요.
                        </p>
                    </div>

                    <div class="space-y-5">
                        <div class="ai-preview-card diary-side-select-card">
                            <label class="diary-detail-label diary-side-label">페르소나</label>
                            <select id="diary-read-persona-select" class="diary-detail-select diary-side-select" disabled>`
                                <option value="" selected> </option>
                                <option>다정한 담임선생님</option>
                                <option>친한 친구</option>
                                <option>차분한 상담가</option>
                                <option>따뜻한 언니</option>
                            </select>
                        </div>

                        <button id="ai-reroll-summary-button" type="button" class="ai-manual-summary-button">다시 요약하기</button>

                        <div class="ai-preview-card">
                            <div class="ai-preview-title">AI 요약</div>
                            <div id="diary-read-summary" class="ai-preview-body">-</div>
                        </div>

                        <div class="ai-preview-card">
                            <div class="ai-preview-title">AI 한마디</div>
                            <div id="diary-read-review" class="ai-preview-body">-</div>
                        </div>
                    </div>
                </aside>
            </div>
        </div>
    </main>
    <script src="js/api.js"></script>
    <script src="js/diary.js"></script>
</body>
</html>
