<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일기 보기 - "하루" commit()</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Petit+Formal+Script&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
        }

        #us-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        /* 워터마크 강제 숨김 */
        a[href*="unicorn.studio"],
        a[href*="hiunicornstudio"],
        .unicorn-studio-watermark,
        [class*="unicorn-studio"],
        [id*="unicorn-studio"] {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }

        /* 콘텐츠 레이어 */
        .diary-layer {
            position: relative;
            z-index: 10;
        }
    </style>
</head>
<body class="page-diary-detail min-h-screen relative font-kr">

    <div id="us-background" data-us-project="ZnNikMOUWaAR1UzFsvqp"></div>

    <a href="my-diary.html" class="diary-layer absolute top-8 left-8 text-white/70 flex items-center gap-2 hover:text-white transition-opacity z-50">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        <span class="tracking-widest text-sm uppercase">Back to Diary</span>
    </a>

    <main class="diary-layer min-h-screen px-6 py-24 md:px-10 lg:px-16">
        <div class="diary-detail-shell">
            <div class="text-center mb-12">
                <p class="font-script text-2xl md:text-3xl text-white/70 mb-3">Read your day</p>
                <h1 class="text-3xl md:text-5xl tracking-tight text-white font-semibold mb-4">
                    저장된 일기 보기
                </h1>
                <div class="w-24 h-[1px] mx-auto bg-white/30 mb-5"></div>
                <p class="text-white/70 text-sm md:text-base max-w-2xl mx-auto leading-relaxed">
                    내가 저장한 일기 내용과 AI 리뷰를 한 화면에서 확인할 수 있어요.
                </p>
            </div>

            <div class="diary-detail-grid">
                <section class="diary-detail-panel">
                    <div class="flex items-center justify-between gap-4 mb-8">
                        <div>
                            <p class="font-script text-xl text-white/70 mb-1">Diary record</p>
                            <h2 class="text-2xl md:text-3xl font-semibold text-white">나의 하루 기록</h2>
                        </div>

                        <div id="voice-btn-wrapper" class="hidden flex flex-col items-end gap-1">
                            <button type="button" id="voice-btn" class="voice-btn">음성으로 입력</button>
                            <div class="flex items-center gap-1 text-xs text-white/50">
                                <span>모드:</span>
                                <button type="button" id="stt-mode-toggle" class="text-xs text-white/70 underline underline-offset-2 hover:text-white transition-colors bg-transparent border-none cursor-pointer p-0"></button>
                            </div>
                            <span id="stt-status" class="hidden text-xs text-white/70 text-right max-w-[200px] leading-snug"></span>
                        </div>
                    </div>

                    <div class="space-y-6">
                        <div class="diary-meta-grid">
                            <div>
                                <label class="diary-detail-label">날짜</label>
                                <input id="diary-read-date" type="date" class="diary-detail-input" readonly>
                            </div>

                            <div>
                                <label class="diary-detail-label">오늘의 감정</label>
                                <div class="diary-icon-select" id="emotion-read-icon-select">
                                    <button type="button" class="diary-icon-select-trigger">
                                        <span class="diary-icon-select-emoji"></span>
                                        <span class="diary-icon-select-label">감정 선택</span>
                                        <span class="diary-icon-select-arrow">▼</span>
                                    </button>
                                </div>
                                <input type="hidden" id="diary-read-emotion">
                            </div>

                            <div>
                                <label class="diary-detail-label">날씨</label>
                                <div class="diary-icon-select" id="weather-read-icon-select">
                                    <button type="button" class="diary-icon-select-trigger">
                                        <span class="diary-icon-select-emoji"></span>
                                        <span class="diary-icon-select-label">날씨 선택</span>
                                        <span class="diary-icon-select-arrow">▼</span>
                                    </button>
                                </div>
                                <input type="hidden" id="diary-read-weather">
                            </div>
                        </div>

                        <div>
                            <label class="diary-detail-label">제목</label>
                            <input id="diary-read-title" type="text" class="diary-detail-input" readonly>
                        </div>

                        <div>
                            <label class="diary-detail-label">일기 내용</label>
                            <textarea id="diary-read-content" class="diary-detail-textarea" readonly></textarea>
                        </div>

                        <!-- 해시태그 영역 -->
                        <div id="diary-hashtag-wrapper" class="flex flex-wrap gap-2 pt-2">
                        </div>

                        <div class="flex flex-col sm:flex-row gap-3 pt-2">
                            <a href="my-diary.html" class="cancel-btn inline-flex items-center justify-center">목록으로</a>
                            <button id="diary-edit-button" type="button" class="save-btn">수정하기</button>
                            <button id="diary-delete-button" type="button" class="delete-btn">삭제하기</button>
                        </div>
                    </div>
                </section>

                <aside class="diary-detail-side">
                    <div class="mb-8">
                        <p class="font-script text-xl text-white/70 mb-1">AI review</p>
                        <h2 class="text-2xl md:text-3xl font-semibold text-white">AI 리뷰</h2>
                        <p class="text-white/70 text-sm mt-3 leading-relaxed">
                            저장한 일기에 대한 AI 요약과 한마디를 보는 영역이에요.
                        </p>
                    </div>

                    <div class="space-y-5">
                        <div class="ai-preview-card diary-side-select-card">
                            <label class="diary-detail-label diary-side-label">페르소나</label>
                            <select id="diary-read-persona-select" class="diary-detail-select diary-side-select" disabled>
                                <option value="" selected> </option>
                            </select>
                        </div>

                        <button id="ai-reroll-summary-button" type="button" class="ai-manual-summary-button">반응이 마음에 안드시면 여기를 눌러주세요!</button>

                        <!-- AI 요약 카드: UI 담당자 확인 후 반영 예정
                        <div class="ai-preview-card">
                            <div class="ai-preview-title">AI 요약</div>
                            <div id="diary-read-summary" class="ai-preview-body">-</div>
                        </div>
                        -->

                        <div class="ai-preview-card">
                            <div class="ai-preview-title">AI 한마디</div>
                            <div id="diary-read-review" class="ai-preview-body">-</div>
                            <button id="tts-play-button" type="button" class="ai-manual-summary-button hidden mt-3">🔊 듣기</button>
                            <audio id="tts-audio" class="hidden w-full mt-2" controls></audio>
                        </div>
                    </div>
                </aside>
            </div>
        </div>
    </main>
    <script src="js/frontend.js"></script>
    <script src="js/api.js"></script>
    <script src="js/diary.js"></script>
    <script src="js/stt.js"></script>
</body>
</html>
