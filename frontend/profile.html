<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 프로필 - "하루" commit()</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Petit+Formal+Script&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
        }

        #us-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        body.page-profile {
            background: transparent !important;
        }

        /* 워터마크 강제 숨김 */
        a[href*="unicorn.studio"],
        a[href*="hiunicornstudio"],
        .unicorn-studio-watermark,
        [class*="unicorn-studio"],
        [id*="unicorn-studio"] {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }

        /* 콘텐츠 레이어 */
        .profile-layer {
            position: relative;
            z-index: 10;
        }

        /* 네비게이션 배경 */
        .profile-nav {
            background: rgba(5, 8, 20, 0.05) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08) !important;
        }

        /* 헤더 텍스트 흰색 */
        .profile-hero-title {
            color: #ffffff;
        }

        /* 달력 select option */
        .profile-calendar-select option {
            background-color: #1a0e14;
            color: #ffffff;
        }

        /* time input 색상 */
        .profile-alarm-time::-webkit-calendar-picker-indicator {
            filter: invert(1) opacity(0.5);
        }
    </style>
</head>
<body class="page-profile min-h-screen font-kr relative">

    <!-- Unicorn Studio 배경 -->
    <div id="us-background" data-us-project="ZnNikMOUWaAR1UzFsvqp"></div>

    <div class="profile-layer absolute top-0 left-0 w-full h-16 z-30 peer"></div>

    <!-- 드롭다운 네비게이션 -->
    <nav class="profile-nav profile-layer absolute top-0 left-0 w-full text-white/80 shadow-2xl z-40 transform -translate-y-full transition-transform duration-500 ease-in-out peer-hover:translate-y-0 hover:translate-y-0">
        <div class="w-full max-w-7xl mx-auto flex justify-between items-center px-8 md:px-16 py-6 font-kr">
            <a href="index.html"      class="text-sm md:text-lg font-light tracking-widest hover:text-white transition-colors duration-300">메인으로</a>
            <a href="my-diary.html"   class="text-sm md:text-lg font-light tracking-widest hover:text-white transition-colors duration-300">나의 일기장</a>
            <a href="ai-persona.html" class="text-sm md:text-lg font-light tracking-widest hover:text-white transition-colors duration-300">AI 페르소나 관리</a>
        </div>
    </nav>

    <main class="profile-layer min-h-screen px-6 py-16 md:px-10 lg:px-16">
        <div class="profile-shell">

            <!-- 헤더 -->
            <section class="profile-hero">
                <p class="font-script text-2xl md:text-3xl text-white/70 mb-3">My profile</p>
                <h1 class="profile-hero-title text-3xl md:text-5xl tracking-tight font-semibold mb-4">내 프로필</h1>
                <div class="profile-hero-line"></div>
                <p class="profile-hero-copy">달력과 알람을 탭에서 나눠서 관리할 수 있어요.</p>
            </section>

            <!-- 사이드바 + 메인 콘텐츠 래퍼 -->
            <div class="profile-body-layout">

                <!-- ─── 왼쪽 사이드바 ─── -->
                <aside class="profile-sidebar-card">

                    <!-- 아바타 + 닉네임 -->
                    <div class="profile-sid-identity">
                        <div class="profile-sid-avatar">
                            <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" class="profile-sid-avatar-icon" id="profile-avatar-icon">
                                <circle cx="24" cy="18" r="9" fill="currentColor" opacity="0.55"/>
                                <path d="M6 42c0-9.941 8.059-18 18-18s18 8.059 18 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.55"/>
                            </svg>
                            <img id="profile-avatar-img" class="profile-sid-avatar-img hidden" alt="프로필 사진">
                        </div>
                        <div class="profile-sid-nickname-wrap">
                            <p class="profile-sid-nickname-label">닉네임</p>
                            <p class="profile-sid-nickname" id="profile-nickname">—</p>
                        </div>
                    </div>

                    <div class="profile-sid-divider"></div>

                    <!-- 이번달 출석 통계 -->
                    <div class="profile-sid-stats">
                        <p class="profile-sid-stats-label">이번달 출석 일수</p>
                        <p class="profile-sid-stats-message" id="profile-attendance-message">집계 중…</p>
                    </div>

                    <!-- 로그아웃 버튼 -->
                    <button id="profile-logout-button" type="button" class="profile-sid-logout">
                        로그아웃
                    </button>

                </aside>

                <!-- ─── 오른쪽 메인 콘텐츠 ─── -->
                <div class="profile-main-content">
                    <section class="profile-tabs-card">
                        <div class="profile-tabs">
                            <button id="profile-tab-calendar" type="button" class="profile-tab-button is-active" data-tab-target="calendar">달력</button>
                            <button id="profile-tab-alarm"    type="button" class="profile-tab-button"           data-tab-target="alarm">알람</button>
                        </div>

                        <!-- 달력 패널 -->
                        <div id="profile-panel-calendar" class="profile-tab-panel">
                            <section class="profile-calendar-card">
                                <div class="profile-calendar-header">
                                    <div>
                                        <p class="profile-calendar-caption">Diary calendar</p>
                                        <div class="profile-calendar-selects">
                                            <select id="profile-calendar-year"  class="profile-calendar-select"></select>
                                            <select id="profile-calendar-month" class="profile-calendar-select"></select>
                                        </div>
                                    </div>
                                </div>

                                <div class="profile-calendar-weekdays">
                                    <span>일</span><span>월</span><span>화</span>
                                    <span>수</span><span>목</span><span>금</span><span>토</span>
                                </div>

                                <div id="profile-calendar-grid" class="profile-calendar-grid"></div>

                                <div class="profile-calendar-legend">
                                    <span class="profile-legend-dot"></span>
                                    <span>일기 작성 완료</span>
                                </div>
                            </section>
                        </div>

                        <!-- 알람 패널 -->
                        <div id="profile-panel-alarm" class="profile-tab-panel hidden">
                            <section class="profile-alarm-card">
                                <div class="profile-alarm-header">
                                    <div>
                                        <p class="profile-calendar-caption">Alarm settings</p>
                                        <h2 class="profile-hero-title text-2xl font-semibold">알람 설정</h2>
                                    </div>
                                </div>

                                <p class="profile-alarm-copy mb-6">시간과 반복 요일을 선택해 알람을 등록하세요.</p>

                                <div class="profile-alarm-form flex flex-col gap-6 mb-8 p-6 bg-white/5 rounded-xl border border-white/10">
                                    
                                    <div class="form-group flex flex-col gap-2">
                                        <label for="alarm-time" class="text-white/80 text-sm font-medium">알람 시간</label>
                                        <input type="time" id="alarm-time" class="profile-alarm-time bg-[#1a0e14] text-white border border-white/20 rounded p-2 w-32 focus:outline-none focus:border-white/50" />
                                    </div>

                                    <div class="form-group flex flex-col gap-2">
                                        <label class="text-white/80 text-sm font-medium">반복 요일</label>
                                        <div class="weekday-group flex gap-4 flex-wrap text-white/90">
                                            <label class="flex items-center gap-1.5 cursor-pointer"><input type="checkbox" id="day-mon" value="MON" class="accent-pink-500 w-4 h-4" /> 월</label>
                                            <label class="flex items-center gap-1.5 cursor-pointer"><input type="checkbox" id="day-tue" value="TUE" class="accent-pink-500 w-4 h-4" /> 화</label>
                                            <label class="flex items-center gap-1.5 cursor-pointer"><input type="checkbox" id="day-wed" value="WED" class="accent-pink-500 w-4 h-4" /> 수</label>
                                            <label class="flex items-center gap-1.5 cursor-pointer"><input type="checkbox" id="day-thu" value="THU" class="accent-pink-500 w-4 h-4" /> 목</label>
                                            <label class="flex items-center gap-1.5 cursor-pointer"><input type="checkbox" id="day-fri" value="FRI" class="accent-pink-500 w-4 h-4" /> 금</label>
                                            <label class="flex items-center gap-1.5 cursor-pointer"><input type="checkbox" id="day-sat" value="SAT" class="accent-pink-500 w-4 h-4" /> 토</label>
                                            <label class="flex items-center gap-1.5 cursor-pointer"><input type="checkbox" id="day-sun" value="SUN" class="accent-pink-500 w-4 h-4" /> 일</label>
                                        </div>
                                    </div>

                                    <div class="form-group flex items-center mt-2">
                                        <label class="profile-alarm-switch flex items-center gap-3 cursor-pointer text-white/90">
                                            <input type="checkbox" id="alarm-enabled" class="profile-alarm-enabled hidden" checked />
                                            <span class="profile-alarm-switch-ui inline-block w-10 h-6 bg-white/20 rounded-full relative transition-colors duration-300"></span>
                                            <span class="text-sm">알람 활성화</span>
                                        </label>
                                    </div>

                                    <div class="button-group flex gap-3 mt-4">
                                        <button type="button" id="save-alarm-btn" class="profile-calendar-nav px-5 py-2.5 bg-white/10 hover:bg-white/20 rounded-lg text-white transition-colors duration-300 text-sm">알람 저장</button>
                                        <button type="button" id="load-alarms-btn" class="profile-calendar-nav px-5 py-2.5 bg-transparent border border-white/20 hover:bg-white/5 rounded-lg text-white transition-colors duration-300 text-sm">목록 새로고침</button>
                                    </div>
                                </div>

                                <div class="profile-hero-line my-8 opacity-30"></div>

                                <section class="profile-alarm-list-wrapper">
                                    <h3 class="text-lg font-semibold text-white mb-4">등록된 알람</h3>
                                    <div id="alarm-list" class="flex flex-col gap-3 text-white/80 text-sm">
                                        <p>등록된 알람이 없습니다.</p>
                                    </div>
                                </section>

                            </section>
                        </div>
                    </section>
                </div>

            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/frontend.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/alarm.js"></script>
</body>
</html>
