<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 일기장 - "하루" commit()</title>

    <script>
        if (!localStorage.getItem("access_token")) {
            window.location.replace("login.html");
        }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Petit+Formal+Script&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>
<body class="page-diary min-h-screen relative font-kr">

    <!-- 호버 트리거 영역 -->
    <div class="absolute top-0 left-0 w-full h-16 z-30 peer"></div>

    <!-- 드롭다운 네비게이션 -->
    <nav class="absolute top-0 left-0 w-full text-[#E8D8C4] shadow-2xl z-40 transform -translate-y-full transition-transform duration-500 ease-in-out peer-hover:translate-y-0 hover:translate-y-0 border-b border-[#C7B7A3]/20" style="background-color: var(--nav-bg);">
        <div class="w-full max-w-7xl mx-auto flex justify-between items-center px-8 md:px-16 py-6 font-kr">
            <a href="index.html"      class="text-sm md:text-lg font-light tracking-widest hover:text-white transition-colors duration-300">메인으로</a>
            <a href="profile.html"    class="text-sm md:text-lg font-light tracking-widest hover:text-white transition-colors duration-300">내 프로필</a>
            <a href="ai-persona.html" class="text-sm md:text-lg font-light tracking-widest hover:text-white transition-colors duration-300">AI 페르소나 관리</a>
        </div>
    </nav>

    <main class="min-h-screen px-6 py-24 md:px-10 lg:px-16 overflow-hidden">
        <div class="max-w-7xl mx-auto">

            <div class="text-center mb-10">
                <p class="font-script text-2xl md:text-3xl text-[#E8D8C4]/85 mb-3">My diary archive</p>
                <h1 class="text-3xl md:text-5xl tracking-tight text-[#E8D8C4] font-semibold mb-4">
                    나의 일기장
                </h1>
                <div class="w-24 h-[1px] mx-auto bg-[#C7B7A3]/70 mb-5"></div>

                <p class="text-[#E8D8C4] text-sm md:text-base max-w-2xl mx-auto leading-relaxed">
                    하루를 기록하면 한 권의 책처럼 쌓이고, 흐릿한 기억은 AI 검색으로 다시 찾아볼 수 있어요.
                </p>

                <div class="flex flex-col sm:flex-row justify-center gap-3 mt-8">
                    <a href="diary_write.html" class="diary-main-btn inline-flex items-center justify-center">
                        일기 작성하기
                    </a>
                    <button type="button" onclick="openSearchModal()" class="diary-sub-btn">
                        AI로 기억 찾기
                    </button>
                </div>
            </div>

            <section class="diary-hero-stage">
                <div class="diary-progress-wrap">
                    <div id="diary-progress" class="diary-progress"></div>
                </div>

                <div class="flex items-center justify-between mb-6">
                    <div>
                        <p class="text-[#E8D8C4] text-xs tracking-[0.28em] uppercase mb-2">My bookshelf</p>
                        <h3 class="text-[#E8D8C4] text-2xl md:text-3xl font-semibold">기록된 일기 책장</h3>
                    </div>

                    <div class="flex gap-3">
                        <button type="button" class="diary-nav-btn" onclick="moveDiaryShelf(-1)">‹</button>
                        <button type="button" class="diary-nav-btn" onclick="moveDiaryShelf(1)">›</button>
                    </div>
                </div>

                <div class="diary-shelf-wrapper">
                    <div class="diary-floor-line"></div>

                    <div id="diary-shelf" class="diary-shelf-track">
                        <div class="diary-empty-book" id="diary-empty-state">
                            아직 저장된 일기가 없어요.<br>
                            첫 번째 하루를 책으로 만들어보세요.
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- AI 검색 모달 -->
    <div id="search-modal" class="diary-modal hidden">
        <div class="diary-modal-backdrop" onclick="closeSearchModal()"></div>
        <div class="diary-modal-card">
            <div class="flex items-start justify-between gap-4 mb-8">
                <div>
                    <p class="font-script text-xl text-[#561C24]/80 mb-1">AI memory search</p>
                    <h2 class="text-2xl md:text-3xl font-semibold text-[#561C24]">AI로 기억 찾기</h2>
                </div>
                <button type="button" class="diary-close-btn" onclick="closeSearchModal()">✕</button>
            </div>

            <div class="space-y-5">
                <div>
                    <label class="persona-label">찾고 싶은 기억</label>
                    <textarea id="diary-search-input" class="persona-textarea diary-search-textarea" placeholder="예: 친구랑 카페 갔던 날, 비슷한 내용의 일기 찾아줘"></textarea>
                </div>

                <button type="button" onclick="fakeDiarySearch()" class="diary-main-btn w-full sm:w-auto">
                    검색하기
                </button>

                <div id="diary-search-result" class="diary-search-result">
                    아직 검색한 내용이 없어요.
                </div>
            </div>
        </div>
    </div>

    <script src="js/frontend.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/diary.js"></script>
</body>
</html>
