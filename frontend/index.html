<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write Down Your Day</title>
    <link rel="icon" type="image/png" href="favicon.png">

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Petit+Formal+Script&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <style>
        /* Unicorn Studio 배경 전체화면 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            cursor: pointer;    
        }

        #us-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        /* 워터마크 강제 숨김 */
        a[href*="unicorn.studio"],
        a[href*="hiunicornstudio"],
        .unicorn-studio-watermark,
        [class*="unicorn-studio"],
        [id*="unicorn-studio"] {
            display: none !important;
            opacity: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }

        /* 네비게이션 배경 – 배경과 어울리는 반투명 다크 */
        .index-nav {
            background: rgba(5, 8, 20, 0.05) !important;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(180, 200, 255, 0.08) !important;
        }

        /* 인삿말 텍스트 */
        #index-user-greeting {
            color: rgba(210, 220, 255, 0.85) !important;
            text-shadow: 0 0 24px rgba(100, 140, 255, 0.3);
        }
    </style>
</head>
<body class="page-index min-h-screen flex items-center justify-center relative">

    <!-- Unicorn Studio 배경 -->
    <div id="us-background" data-us-project="ujvuAylK8Kf7yI6r8Sza"></div>

    <!-- 호버 트리거 -->
    <div class="absolute top-0 left-0 w-full h-16 z-30 peer"></div>

    <!-- 드롭다운 네비게이션 -->
    <nav class="index-nav absolute top-0 left-0 w-full text-[#c8d8f8] shadow-2xl z-40 transform -translate-y-full transition-transform duration-500 ease-in-out peer-hover:translate-y-0 hover:translate-y-0">
        <div class="w-full max-w-7xl mx-auto flex justify-between items-center px-8 md:px-16 py-6 font-kr">
            <a id="auth-link" href="login.html"
               class="text-sm md:text-lg font-medium tracking-widest hover:text-white transition-colors duration-300">
                로그인/회원가입
            </a>
            <a href="my-diary.html"
               class="text-sm md:text-lg font-medium tracking-widest hover:text-white transition-colors duration-300">
                나의 일기장
            </a>
            <a href="ai-persona.html"
               class="text-sm md:text-lg font-medium tracking-widest hover:text-white transition-colors duration-300">
                AI 페르소나 관리
            </a>
        </div>
    </nav>

    <!-- 로그인 후 인삿말 (기존 auth.js 연동) -->
    <p id="index-user-greeting"
       class="hidden absolute bottom-40 w-full text-center text-lg sm:text-xl md:text-2xl leading-relaxed font-kr animate-fade z-10"
       style="white-space: pre-line;">
    </p>

    <script src="js/frontend.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener("click", (e) => {
            if (!e.target.closest("a, button")) {
                window.location.href = "my-diary.html";
            }
        });
    </script>
</body>
</html>
